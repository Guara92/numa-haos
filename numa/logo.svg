<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 100" width="250" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1420;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ee7f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="250" height="100" rx="12" fill="url(#bgGrad)" />

  <!-- Icon mark: N letterform + DNS signal arcs, vertically centred at y=50 -->
  <!-- N occupies x: 14..42, y: 18..82 (height 64) -->
  <g filter="url(#glow)">
    <!-- Left vertical stroke of N -->
    <line x1="14" y1="18" x2="14" y2="82" stroke="url(#arcGrad)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Diagonal stroke of N -->
    <line x1="14" y1="18" x2="42" y2="82" stroke="url(#arcGrad)" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Right vertical stroke of N -->
    <line x1="42" y1="18" x2="42" y2="82" stroke="url(#arcGrad)" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Signal arcs emanating rightward from x=50, centred at y=50 -->
  <path d="M 50 50 Q 58 38 58 50 Q 58 62 50 50"
        fill="none" stroke="url(#arcGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.80"/>
  <path d="M 50 50 Q 63 30 63 50 Q 63 70 50 50"
        fill="none" stroke="url(#arcGrad)" stroke-width="3"   stroke-linecap="round" opacity="0.55"/>
  <path d="M 50 50 Q 68 20 68 50 Q 68 80 50 50"
        fill="none" stroke="url(#arcGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.30"/>

  <!-- Wordmark: "numa" — starts after the icon mark -->
  <text
    x="158"
    y="47"
    font-family="'DM Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#e8edf8"
    dominant-baseline="middle"
    text-anchor="middle"
  >numa</text>

  <!-- Tagline -->
  <text
    x="158"
    y="72"
    font-family="'DM Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="400"
    letter-spacing="2"
    fill="#4f8ef7"
    dominant-baseline="middle"
    text-anchor="middle"
    opacity="0.85"
  >DNS · HOME ASSISTANT</text>
</svg>
