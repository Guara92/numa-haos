---
name: Release

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build & Push ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - aarch64
          - amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker platform
        id: platform
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Get release version
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./numa
          file: ./numa/Dockerfile
          platforms: ${{ steps.platform.outputs.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/numa-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/numa-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:20.0.4
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.release.created_at }}
            BUILD_DESCRIPTION=Numa - Self-hosted DNS resolver for Home Assistant
            BUILD_NAME=Numa
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
